<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 Her Dashboard</title>

<style>
body {
  font-family: sans-serif;
  background: #ffe4ec;
  margin: 0;
  transition: 0.4s;
}

/* Top bar */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.menu {
  font-size: 22px;
  cursor: pointer;
}

/* Sidebar */
.sidebar {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #fff0f5;
  padding: 15px;
  transition: 0.3s;
}

.sidebar.active {
  right: 0;
}

.sidebar div {
  margin: 10px 0;
  cursor: pointer;
}

/* Content */
.container {
  padding: 15px;
  text-align: center;
}

.bar {
  background: #ffd1dc;
  border-radius: 20px;
  height: 20px;
  margin: 8px 0;
}

.fill {
  height: 100%;
  background: #ff8fab;
}

input, textarea {
  width: 80%;
  margin: 5px;
  padding: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #ff8fab;
  color: white;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

.hidden {
  display: none;
}

.memory-card {
  background:#fff0f5;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h3>💗</h3>
  <div class="menu" onclick="toggleMenu()">⋮</div>
</div>

<div class="sidebar" id="sidebar">
  <div onclick="showSection('dashboard')">💗 Dashboard</div>
  <div onclick="showSection('memories')">📸 Memories</div>
  <div onclick="showSection('plans')">📝 Plans</div>
  <div onclick="showSection('music')">🎵 Music</div>
  <div onclick="toggleDark()">🌙 Dark Mode</div>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <h2>Her Dashboard</h2>
  <div id="bars"></div>

  <h3>Overall 💖</h3>
  <div class="bar"><div id="overallBar" class="fill"></div></div>
  <p id="overallText"></p>
</div>

<!-- MEMORIES -->
<div id="memories" class="hidden">
  <h2>📸 Memories</h2>

  <input type="file" id="imgInput" accept="image/*"><br>
  <textarea id="memoryNote" placeholder="Write something..."></textarea><br>
  <button onclick="saveMemory()">Save 💗</button>

  <div id="memoryList"></div>
</div>

<!-- PLANS -->
<div id="plans" class="hidden">
  <h2>📝 Plans</h2>
  <textarea id="planInput"></textarea><br>
  <button onclick="savePlan()">Add</button>
  <div id="planList"></div>
</div>

<!-- MUSIC -->
<div id="music" class="hidden">
  <h2>🎵 Music</h2>
  <textarea id="musicInput" placeholder="Paste link"></textarea><br>
  <button onclick="saveMusic()">Add</button>
  <div id="musicList"></div>
</div>

</div>

<script>

// DATA
let data = JSON.parse(localStorage.getItem("bars")) || {
  trust: 50, mood: 50, love: 50, angry: 20, miss: 40, freaky: 30
};

let memories = JSON.parse(localStorage.getItem("memories")) || [];
let plans = JSON.parse(localStorage.getItem("plans")) || [];
let music = JSON.parse(localStorage.getItem("music")) || [];

const labels = {
  trust: "Trust 🤍",
  mood: "Mood 😊",
  love: "Love 💕",
  angry: "Angry 😤",
  miss: "Miss 🥺",
  freaky: "Freaky 😏"
};

// MENU
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("active");
}

function showSection(id) {
  ["dashboard","memories","plans","music"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
  toggleMenu();
}

// DARK MODE
function toggleDark() {
  document.body.style.background =
    document.body.style.background === "black" ? "#ffe4ec" : "black";
}

// DASHBOARD
function render() {
  let html = "";
  let total = 0, count = 0;

  for (let key in data) {
    total += data[key];
    count++;

    html += `
      <div>${labels[key]} (${data[key]}%)</div>
      <div class="bar">
        <div class="fill" style="width:${data[key]}%"></div>
      </div>
    `;
  }

  document.getElementById("bars").innerHTML = html;

  let overall = Math.round(total / count);
  document.getElementById("overallBar").style.width = overall + "%";
  document.getElementById("overallText").innerText = overall + "%";

  renderMemories();
  renderPlans();
  renderMusic();
}

// MEMORIES
function saveMemory() {
  let file = document.getElementById("imgInput").files[0];
  let note = document.getElementById("memoryNote").value;

  if (!file) {
    alert("Select image!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(e) {
    let now = new Date().toLocaleString();

    let memory = {
      img: e.target.result,
      note: note,
      time: now
    };

    memories.unshift(memory);
    localStorage.setItem("memories", JSON.stringify(memories));

    renderMemories();
  };

  reader.readAsDataURL(file);
}

function renderMemories() {
  let html = "";

  memories.forEach(m => {
    html += `
      <div class="memory-card">
        <img src="${m.img}" style="width:100%;border-radius:10px;"><br>
        <b>${m.note || ""}</b><br>
        <small>${m.time}</small>
      </div>
    `;
  });

  document.getElementById("memoryList").innerHTML = html;
}

// PLANS
function savePlan() {
  let val = document.getElementById("planInput").value;
  plans.push(val);
  localStorage.setItem("plans", JSON.stringify(plans));
  renderPlans();
}

function renderPlans() {
  document.getElementById("planList").innerHTML = plans.join("<br>");
}

// MUSIC
function saveMusic() {
  let val = document.getElementById("musicInput").value;
  music.push(val);
  localStorage.setItem("music", JSON.stringify(music));
  renderMusic();
}

function renderMusic() {
  document.getElementById("musicList").innerHTML = music.join("<br>");
}

render();

</script>

</body>
</html>
