<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 Relationship OS</title>

<style>
body {
  font-family: sans-serif;
  margin: 0;
  background: #ffe4ec;
}

/* TOP */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
}

.menu { cursor: pointer; font-size: 22px; }

/* SIDEBAR */
.sidebar {
  position: fixed;
  right: -260px;
  top: 0;
  width: 250px;
  height: 100%;
  background: #fff0f5;
  padding: 15px;
  transition: 0.3s;
}
.sidebar.active { right: 0; }

/* CONTENT */
.container { padding: 15px; text-align: center; }

.bar {
  background: #ffd1dc;
  border-radius: 20px;
  height: 20px;
  margin: 8px 0;
}
.fill {
  height: 100%;
  background: #ff8fab;
}

input, textarea {
  width: 80%;
  margin: 5px;
  padding: 6px;
  border-radius: 8px;
  border: none;
}

button {
  background: #ff8fab;
  color: white;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

.hidden { display: none; }

.card {
  background:#fff0f5;
  padding:10px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
  <h3>💗</h3>
  <div class="menu" onclick="toggleMenu()">⋮</div>
</div>

<div class="sidebar" id="sidebar">
  <div onclick="show('dashboard')">💗 Dashboard</div>
  <div onclick="show('chat')">💬 Chat</div>
  <div onclick="show('tasks')">🎯 Tasks</div>
  <div onclick="show('memories')">📸 Memories</div>
  <div onclick="show('music')">🎵 Music</div>
</div>

<div class="container">

<!-- DASHBOARD -->
<div id="dashboard">
  <h2 id="userTitle"></h2>
  <div id="bars"></div>

  <h3>Overall 💖</h3>
  <div class="bar"><div id="overallBar" class="fill"></div></div>
  <p id="overallText"></p>

  <p id="reaction"></p>
</div>

<!-- CHAT -->
<div id="chat" class="hidden">
  <h2>💬 Chat</h2>
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- TASKS -->
<div id="tasks" class="hidden">
  <h2>🎯 Tasks</h2>
  <input id="taskInput">
  <button onclick="addTask()">Add</button>
  <div id="taskList"></div>
</div>

<!-- MEMORIES -->
<div id="memories" class="hidden">
  <h2>📸 Memories</h2>
  <input type="file" id="imgInput"><br>
  <textarea id="noteInput"></textarea><br>
  <button onclick="saveMemory()">Save</button>
  <div id="memoryList"></div>
</div>

<!-- MUSIC -->
<div id="music" class="hidden">
  <h2>🎵 Music</h2>
  <input id="musicInput">
  <button onclick="addMusic()">Add</button>
  <div id="musicList"></div>
</div>

</div>

<script>

// USER
let user = new URLSearchParams(location.search).get("user") || "you";

// STORAGE
let appData = JSON.parse(localStorage.getItem("appData")) || {
  you:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
  her:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
  chat:[], tasks:[], memories:[], music:[]
};

let data = appData[user];

const labels = {
  trust:"Trust 🤍", mood:"Mood 😊", love:"Love 💕",
  angry:"Angry 😤", miss:"Miss 🥺", freaky:"Freaky 😏"
};

// MENU
function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function show(id){
  ["dashboard","chat","tasks","memories","music"].forEach(s=>{
    document.getElementById(s).classList.add("hidden");
  });
  document.getElementById(id).classList.remove("hidden");
  toggleMenu();
}

// SAVE
function save(){
  appData[user]=data;
  localStorage.setItem("appData",JSON.stringify(appData));
  renderAll();
}

// DASHBOARD
function renderDashboard(){
  document.getElementById("userTitle").innerText = user.toUpperCase();

  let html="",total=0,count=0;

  for(let k in data){
    total+=data[k]; count++;
    html+=`<div>${labels[k]} (${data[k]}%)</div>
    <div class="bar"><div class="fill" style="width:${data[k]}%"></div></div>`;
  }

  document.getElementById("bars").innerHTML=html;

  let overall=Math.round(total/count);
  document.getElementById("overallBar").style.width=overall+"%";
  document.getElementById("overallText").innerText=overall+"%";

  // SMART REACTION
  let r="";
  if(data.angry>70) r="You messed up 😶";
  else if(data.love>70) r="Good job 💗";
  else if(data.miss>60) r="She misses you 🥺";

  document.getElementById("reaction").innerText=r;
}

// CHAT
function sendMsg(){
  let text=document.getElementById("chatInput").value;
  appData.chat.push({user,text,time:new Date().toLocaleTimeString()});
  save();
}

function renderChat(){
  let html="";
  appData.chat.forEach(m=>{
    html+=`<div style="text-align:${m.user===user?'right':'left'}">
    ${m.text}<br><small>${m.time}</small></div>`;
  });
  document.getElementById("chatBox").innerHTML=html;
}

// TASKS
function addTask(){
  let t=document.getElementById("taskInput").value;
  appData.tasks.push({text:t,done:false});
  save();
}

function toggleTask(i){
  let t=appData.tasks[i];
  t.done=!t.done;
  if(t.done) data.trust=Math.min(100,data.trust+5);
  save();
}

function renderTasks(){
  let html="";
  appData.tasks.forEach((t,i)=>{
    html+=`<div onclick="toggleTask(${i})">
    ${t.done?"✅":"⬜"} ${t.text}</div>`;
  });
  document.getElementById("taskList").innerHTML=html;
}

// MEMORIES
function saveMemory(){
  let file=document.getElementById("imgInput").files[0];
  let note=document.getElementById("noteInput").value;

  let reader=new FileReader();
  reader.onload=function(e){
    appData.memories.unshift({
      img:e.target.result,
      note,
      time:new Date().toLocaleString(),
      pinned:false
    });
    save();
  };
  reader.readAsDataURL(file);
}

function renderMemories(){
  let sorted=[...appData.memories].sort((a,b)=>b.pinned-a.pinned);

  let html="";
  sorted.forEach((m,i)=>{
    html+=`
    <div class="card">
      <img src="${m.img}" style="width:100%">
      <b>${m.note}</b><br>
      <small>${m.time}</small><br>
      <button onclick="togglePin(${i})">📌</button>
    </div>`;
  });

  document.getElementById("memoryList").innerHTML=html;
}

function togglePin(i){
  appData.memories[i].pinned=!appData.memories[i].pinned;
  save();
}

// MUSIC
function addMusic(){
  let link=document.getElementById("musicInput").value;
  appData.music.push(link);
  save();
}

function renderMusic(){
  let html="";
  appData.music.forEach(l=>{
    html+=`<iframe width="100%" height="80"
    src="${l.replace("watch?v=","embed/")}"></iframe>`;
  });
  document.getElementById("musicList").innerHTML=html;
}

// RENDER ALL
function renderAll(){
  renderDashboard();
  renderChat();
  renderTasks();
  renderMemories();
  renderMusic();
}

renderAll();

</script>

</body>
</html>
