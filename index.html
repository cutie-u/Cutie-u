<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 Her Dashboard</title>

<style>
body {
  font-family: sans-serif;
  background: #ffe4ec;
  text-align: center;
  padding: 20px;
}
.bar {
  background: #ffd1dc;
  border-radius: 20px;
  margin: 8px 0;
  height: 20px;
}
.fill {
  height: 100%;
  background: #ff8fab;
}
input {
  width: 60px;
}
</style>
</head>

<body>

<h2>💗 Her Dashboard</h2>

<div id="bars"></div>

<h3>Overall 💖</h3>
<div class="bar"><div id="overallBar" class="fill"></div></div>
<p id="overallText"></p>

<div id="admin" style="display:none;"></div>

<script>

let data = JSON.parse(localStorage.getItem("bars")) || {
  trust: 50,
  mood: 50,
  love: 50,
  angry: 20,
  miss: 40,
  freaky: 30
};

const labels = {
  trust: "Trust 🤍",
  mood: "Mood 😊",
  love: "Love 💕",
  angry: "Angry 😤",
  miss: "Miss 🥺",
  freaky: "Freaky 😏"
};

const isAdmin = new URLSearchParams(location.search).get("key") === "hersecret123";

function render() {
  let html = "";
  let adminHTML = "";
  let total = 0, count = 0;

  for (let key in data) {
    total += data[key];
    count++;

    html += `
      <div>${labels[key]} (${data[key]}%)</div>
      <div class="bar"><div class="fill" style="width:${data[key]}%"></div></div>
    `;

    if (isAdmin) {
      adminHTML += `<input id="${key}" type="number" value="${data[key]}"><br>`;
    }
  }

  document.getElementById("bars").innerHTML = html;

  let overall = Math.round(total / count);
  document.getElementById("overallBar").style.width = overall + "%";
  document.getElementById("overallText").innerText = overall + "%";

  if (isAdmin) {
    adminHTML += `<button onclick="update()">Update 💗</button>`;
    document.getElementById("admin").innerHTML = adminHTML;
    document.getElementById("admin").style.display = "block";
  }
}

function update() {
  for (let key in data) {
    data[key] = Number(document.getElementById(key).value);
  }
  localStorage.setItem("bars", JSON.stringify(data));
  render();
}

render();

</script>

</body>
</html>
