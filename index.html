<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💗 Relationship OS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d88">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#ffe4ec,#ffd6e0);
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

/* SECTION */
.section{display:none;padding:15px;}
.section.active{display:block;}

/* CARD */
.card{
  background:rgba(255,255,255,0.5);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

/* BAR */
.bar{height:12px;background:#eee;border-radius:20px;}
.fill{
  height:100%;
  background:linear-gradient(90deg,#ff6fa5,#ff2e75);
  border-radius:20px;
  transform:scaleX(0);
  transform-origin:left;
  transition:0.6s;
}

/* INPUT */
input,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}

button{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
}

/* CHAT */
.msg{
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
}
.me{background:#ff4d88;color:white;margin-left:auto;}
.other{background:white;}

iframe{
  width:100%;
  height:200px;
  border-radius:10px;
}

/* NOTIFICATION */
.notify{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff4d88;
  color:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('dashboard')">💗</div>
  <div onclick="show('chat')">💬</div>
  <div onclick="show('tasks')">🎯</div>
  <div onclick="show('memories')">📸</div>
  <div onclick="show('music')">🎵</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
  <div class="card">
    <h3 id="userTitle"></h3>
    <div id="bars"></div>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<!-- TASKS -->
<div id="tasks" class="section">
  <input id="taskInput">
  <button onclick="addTask()">Add</button>
  <div id="taskList"></div>
</div>

<!-- MEMORIES -->
<div id="memories" class="section">
  <input type="file" id="imgInput">
  <textarea id="noteInput"></textarea>
  <button onclick="saveMemory()">Save</button>
  <div id="memoryList"></div>
</div>

<!-- MUSIC -->
<div id="music" class="section">
  <input id="musicInput" placeholder="YouTube link">
  <button onclick="addMusic()">Add</button>
  <div id="musicList"></div>
</div>

<script>

// HAPTIC
function haptic(){
  if(navigator.vibrate) navigator.vibrate(10);
}

// NOTIFICATION
function notify(text){
  let n=document.createElement("div");
  n.className="notify";
  n.innerText=text;
  document.body.appendChild(n);
  setTimeout(()=>n.remove(),2000);
}

// USER
let user=new URLSearchParams(location.search).get("user")||"you";

// DATA
let appData=JSON.parse(localStorage.getItem("appData"))||{
  you:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
  her:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
  chat:[],tasks:[],memories:[],music:[]
};

let data=appData[user];

const labels={
  trust:"Trust",mood:"Mood",love:"Love",
  angry:"Angry",miss:"Miss",freaky:"Freaky"
};

// NAV
function show(id){
  haptic();
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SAVE
function save(){
  appData[user]=data;
  localStorage.setItem("appData",JSON.stringify(appData));
  renderAll();
}

// DASHBOARD
function renderDashboard(){
  document.getElementById("userTitle").innerText="💗 "+user;

  let html="";
  for(let k in data){
    html+=`${labels[k]} ${data[k]}%
    <div class="bar"><div class="fill" style="width:${data[k]}%"></div></div>`;
  }

  document.getElementById("bars").innerHTML=html;

  setTimeout(()=>{
    document.querySelectorAll(".fill").forEach(el=>{
      el.style.transform="scaleX(1)";
    });
  },100);
}

// CHAT
function sendMsg(){
  haptic();
  let t=document.getElementById("chatInput").value;
  appData.chat.push({user,text:t});
  notify("💬 Message sent");
  save();
}

function renderChat(){
  let html="";
  appData.chat.forEach(m=>{
    html+=`<div class="msg ${m.user===user?'me':'other'}">${m.text}</div>`;
  });
  document.getElementById("chatBox").innerHTML=html;
}

// TASKS
function addTask(){
  let t=document.getElementById("taskInput").value;
  appData.tasks.push({text:t,done:false});
  notify("🎯 Task added");
  save();
}

function renderTasks(){
  let html="";
  appData.tasks.forEach((t,i)=>{
    html+=`<div onclick="toggleTask(${i})">
    ${t.done?"✅":"⬜"} ${t.text}</div>`;
  });
  document.getElementById("taskList").innerHTML=html;
}

function toggleTask(i){
  appData.tasks[i].done=!appData.tasks[i].done;
  notify("✔ Task updated");
  save();
}

// MEMORIES
function saveMemory(){
  let file=document.getElementById("imgInput").files[0];
  let note=document.getElementById("noteInput").value;

  let reader=new FileReader();
  reader.onload=e=>{
    appData.memories.unshift({
      img:e.target.result,
      note,
      time:new Date().toLocaleString()
    });
    notify("📸 Memory saved");
    save();
  };
  reader.readAsDataURL(file);
}

function renderMemories(){
  let html="";
  appData.memories.forEach(m=>{
    html+=`<div class="card">
      <img src="${m.img}" style="width:100%">
      <p>${m.note}</p>
      <small>${m.time}</small>
    </div>`;
  });
  document.getElementById("memoryList").innerHTML=html;
}

// MUSIC
function addMusic(){
  let l=document.getElementById("musicInput").value;
  appData.music.push(l);
  notify("🎵 Song added");
  save();
}

function renderMusic(){
  let html="";
  appData.music.forEach(l=>{
    if(l.includes("playlist")){
      let id=l.split("list=")[1];
      html+=`<iframe src="https://www.youtube.com/embed/videoseries?list=${id}"></iframe>`;
    } else if(l.includes("watch?v=")){
      let id=l.split("v=")[1];
      html+=`<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
    }
  });
  document.getElementById("musicList").innerHTML=html;
}

// INIT
function renderAll(){
  renderDashboard();
  renderChat();
  renderTasks();
  renderMemories();
  renderMusic();
}

renderAll();

</script>

</body>
</html>
