<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💗 Relationship OS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#ffe4ec,#ffd6e0);
}
.nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.section{display:none;padding:15px;}
.section.active{display:block;}

.card{
  background:rgba(255,255,255,0.5);
  padding:15px;
  border-radius:15px;
}

.bar{
  height:14px;
  background:#eee;
  border-radius:20px;
  margin-top:6px;
  position:relative;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#ff6fa5,#ff2e75);
  border-radius:20px;
  width:0%;
  transition:width 0.2s;
}

input,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}

button{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
}

.msg{
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
}
.me{background:#ff4d88;color:white;margin-left:auto;}
.other{background:white;}

iframe{
  width:100%;
  height:200px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('dashboard')">💗</div>
  <div onclick="show('chat')">💬</div>
  <div onclick="show('tasks')">🎯</div>
  <div onclick="show('memories')">📸</div>
  <div onclick="show('music')">🎵</div>
</div>

<div id="dashboard" class="section active">
  <div class="card">
    <h3 id="userTitle"></h3>
    <div id="bars"></div>
  </div>
</div>

<div id="chat" class="section">
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<div id="tasks" class="section">
  <input id="taskInput">
  <button onclick="addTask()">Add</button>
  <div id="taskList"></div>
</div>

<div id="memories" class="section">
  <input type="file" id="imgInput">
  <textarea id="noteInput"></textarea>
  <button onclick="saveMemory()">Save</button>
  <div id="memoryList"></div>
</div>

<div id="music" class="section">
  <input id="musicInput">
  <button onclick="addMusic()">Add</button>
  <div id="musicList"></div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCsv34rRwtD35qcTl8RMeBwFF5F_azkMg8",
  authDomain: "rating-bar-24a81.firebaseapp.com",
  databaseURL: "https://rating-bar-24a81-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rating-bar-24a81",
  storageBucket: "rating-bar-24a81.firebasestorage.app",
  messagingSenderId: "1017485664370",
  appId: "1:1017485664370:web:a0b43f4426238a61ce22eb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USER
let user=new URLSearchParams(location.search).get("user")||"you";

let appData={}, data={};

const labels={
  trust:"Trust",mood:"Mood",love:"Love",
  angry:"Angry",miss:"Miss",freaky:"Freaky"
};

// LIVE SYNC
db.ref("appData").on("value", snap=>{
  appData = snap.val() || {
    you:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
    her:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
    chat:[],tasks:[],memories:[],music:[]
  };
  data = appData[user];
  renderAll();
});

// SAVE
function save(){
  db.ref("appData").set(appData);
}

// NAV
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// 🔥 DASHBOARD (FINAL FIX)
function renderDashboard(){
  document.getElementById("userTitle").innerText="💗 "+user;

  let html="";
  let hour=new Date().getHours();

  for(let k in data){

    if(k==="freaky" && !(hour>=23 || hour<6)) continue;

    html+=`
    <div style="margin-top:15px;">
      <div style="display:flex;justify-content:space-between;">
        <span>${labels[k]}</span>
        <span>${data[k]}%</span>
      </div>

      <div class="bar" data-key="${k}">
        <div class="fill" style="width:${data[k]}%"></div>
      </div>
    </div>`;
  }

  document.getElementById("bars").innerHTML=html;

  enableSliding();
}

// 🔥 SLIDER ENGINE (REAL FIX)

      let activeBar = null;
let activeKey = null;

function enableSliding(){

  document.querySelectorAll(".bar").forEach(bar=>{
    let key = bar.dataset.key;

    const update = (clientX)=>{
      if(!activeBar) return;

      let rect = activeBar.getBoundingClientRect();
      let percent = ((clientX - rect.left) / rect.width) * 100;

      percent = Math.max(0, Math.min(100, percent));

      data[activeKey] = Math.round(percent);

      activeBar.querySelector(".fill").style.width = percent + "%";
    };

    // START
    bar.addEventListener("mousedown", e=>{
      activeBar = bar;
      activeKey = key;
      update(e.clientX);
    });

    bar.addEventListener("touchstart", e=>{
      activeBar = bar;
      activeKey = key;
      update(e.touches[0].clientX);
    });

  });

  // MOVE
  document.addEventListener("mousemove", e=>{
    if(activeBar) update(e.clientX);
  });

  document.addEventListener("touchmove", e=>{
    if(activeBar) update(e.touches[0].clientX);
  });

  // END
  document.addEventListener("mouseup", ()=>{
    if(activeBar){
      save();
      activeBar = null;
      activeKey = null;
    }
  });

  document.addEventListener("touchend", ()=>{
    if(activeBar){
      save();
      activeBar = null;
      activeKey = null;
    }
  });
}

// CHAT
function sendMsg(){
  let t=document.getElementById("chatInput").value;
  if(!t) return;

  appData.chat.push({
    user,
    text:t,
    time:new Date().toLocaleTimeString()
  });

  document.getElementById("chatInput").value="";
  save();
}

function renderChat(){
  let html="";
  appData.chat.forEach(m=>{
    html+=`<div class="msg ${m.user===user?'me':'other'}">
    ${m.text}<br><small>${m.time}</small></div>`;
  });
  document.getElementById("chatBox").innerHTML=html;
}

// TASKS
function addTask(){
  let t=document.getElementById("taskInput").value;
  if(!t) return;

  appData.tasks.push({text:t,done:false});
  document.getElementById("taskInput").value="";
  save();
}

function renderTasks(){
  let html="";
  appData.tasks.forEach((t,i)=>{
    html+=`<div onclick="toggleTask(${i})">
    ${t.done?"✅":"⬜"} ${t.text}</div>`;
  });
  document.getElementById("taskList").innerHTML=html;
}

function toggleTask(i){
  appData.tasks[i].done=!appData.tasks[i].done;
  save();
}

// MEMORIES
function saveMemory(){
  let file=document.getElementById("imgInput").files[0];
  let note=document.getElementById("noteInput").value;

  if(!file) return;

  let reader=new FileReader();
  reader.onload=e=>{
    appData.memories.unshift({
      img:e.target.result,
      note,
      time:new Date().toLocaleString()
    });
    save();
  };
  reader.readAsDataURL(file);
}

function renderMemories(){
  let html="";
  appData.memories.forEach(m=>{
    html+=`<div class="card">
      <img src="${m.img}" style="width:100%">
      <p>${m.note}</p>
      <small>${m.time}</small>
    </div>`;
  });
  document.getElementById("memoryList").innerHTML=html;
}

// MUSIC
function renderMusic(){
  let html="";

  appData.music.forEach(l=>{

    let id="";

    // youtu.be link
    if(l.includes("youtu.be/")){
      id = l.split("youtu.be/")[1].split("?")[0];
    }

    // normal youtube
    else if(l.includes("watch?v=")){
      id = l.split("v=")[1].split("&")[0];
    }

    // playlist
    else if(l.includes("list=")){
      let pid = l.split("list=")[1].split("&")[0];
      html += `<iframe src="https://www.youtube.com/embed/videoseries?list=${pid}"></iframe>`;
      return;
    }

    if(id){
      html += `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
    }

  });

  document.getElementById("musicList").innerHTML = html;
}

// RENDER
function renderAll(){
  renderDashboard();
  renderChat();
  renderTasks();
  renderMemories();
  renderMusic();
}

</script>

</body>
</html>
