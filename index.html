<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trust Meter 💗</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #ffe4ec;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: #fff0f5;
  padding: 25px;
  border-radius: 20px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h1 {
  color: #ff6f91;
}

.bar {
  background: #ffd1dc;
  border-radius: 20px;
  overflow: hidden;
  height: 25px;
  margin: 15px 0;
}

.fill {
  height: 100%;
  width: 50%;
  background: #ff8fab;
  transition: 0.4s;
}

input, button {
  margin-top: 10px;
  padding: 8px;
  border-radius: 10px;
  border: none;
}

button {
  background: #ff8fab;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
  <h1>💗 Trust Level</h1>

  <div class="bar">
    <div id="fill" class="fill"></div>
  </div>

  <p id="percent">50%</p>

  <!-- Admin Panel -->
  <div id="adminPanel" style="display:none;">
    <input type="number" id="input" placeholder="Set % (0-100)">
    <button onclick="updateTrust()">Update</button>
  </div>
</div>

<script>
let trust = localStorage.getItem("trust") || 50;

function render() {
  document.getElementById("fill").style.width = trust + "%";
  document.getElementById("percent").innerText = trust + "%";
}
render();

// Admin mode via secret key
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("key") === "hersecret123") {
  document.getElementById("adminPanel").style.display = "block";
}

function updateTrust() {
  let val = document.getElementById("input").value;
  if (val >= 0 && val <= 100) {
    trust = val;
    localStorage.setItem("trust", trust);
    render();
  }
}
</script>

</body>
</html>
