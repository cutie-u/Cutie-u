<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 Relationship OS</title>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg,#ffe4ec,#ffd6e0);
  color: #222;
}

/* HEADER */
.header {
  padding: 25px 20px 10px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin: 4px 0 0;
  opacity: 0.6;
}

/* CARD */
.card {
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* BAR */
.bar {
  height: 14px;
  border-radius: 20px;
  background: rgba(255,255,255,0.6);
  overflow: hidden;
}

.fill {
  height: 100%;
  border-radius: 20px;
  background: linear-gradient(90deg,#ff6fa5,#ff2e75);
  box-shadow: 0 4px 12px rgba(255,80,120,0.4);
  transform: scaleX(0);
  transform-origin: left;
  transition: 0.6s ease;
}

/* LABEL */
.row {
  display:flex;
  justify-content:space-between;
  font-size:14px;
  margin-top:12px;
}

/* FADE */
.fade {
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

/* BUTTON */
button {
  background: linear-gradient(135deg,#ff8fab,#ff4d88);
  border: none;
  padding: 10px;
  border-radius: 12px;
  color: white;
  margin-top: 10px;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1 id="userTitle">💗 you</h1>
  <p>Your current vibe</p>
</div>

<div class="card fade">
  <div id="bars"></div>
</div>

<script>

// USER
let user = new URLSearchParams(location.search).get("user") || "you";

// DATA
let appData = JSON.parse(localStorage.getItem("appData")) || {
  you:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
  her:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30}
};

let data = appData[user];

const labels = {
  trust:"Trust",
  mood:"Mood",
  love:"Love",
  angry:"Angry",
  miss:"Miss",
  freaky:"Freaky"
};

// RENDER
function render() {
  document.getElementById("userTitle").innerText = "💗 " + user;

  let html = "";

  for (let k in data) {
    html += `
    <div class="row">
      <span>${labels[k]}</span>
      <span>${data[k]}%</span>
    </div>
    <div class="bar">
      <div class="fill" style="width:${data[k]}%"></div>
    </div>`;
  }

  document.getElementById("bars").innerHTML = html;

  // animation trigger
  setTimeout(()=>{
    document.querySelectorAll(".fill").forEach(el=>{
      el.style.transform="scaleX(1)";
    });
  },100);
}

render();

</script>

</body>
</html>
