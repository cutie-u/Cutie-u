<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💗 Her Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
  font-family: sans-serif;
  background: #ffe4ec;
  text-align: center;
  padding: 20px;
}
.bar {
  background: #ffd1dc;
  border-radius: 20px;
  margin: 8px 0;
  height: 20px;
}
.fill {
  height: 100%;
  background: #ff8fab;
}
</style>
</head>

<body>

<h2>💗 Her Dashboard</h2>

<div id="bars"></div>

<h3>Overall 💖</h3>
<div class="bar"><div id="overallBar" class="fill"></div></div>
<p id="overallText"></p>

<script>

// 🔥 YOUR REAL CONFIG (replace this)
const firebaseConfig = {
  apiKey: "AIzaSyCsv34rRwtD35qcTl8RMeBwFF5F_azkMg8",
  authDomain: "rating-bar-24a81.firebaseapp.com",
  projectId: "rating-bar-24a81",
  storageBucket: "rating-bar-24a81.firebasestorage.app",
  messagingSenderId: "1017485664370",
  appId: "1:1017485664370:web:a0b43f4426238a61ce22eb"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const labels = {
  trust: "Trust 🤍",
  mood: "Mood 😊",
  love: "Love 💕",
  angry: "Angry 😤",
  miss: "Miss 🥺",
  freaky: "Freaky 😏"
};

db.ref("bars").on("value", snap => {
  const data = snap.val();

  console.log("DATA:", data); // 🔥 debug

  if (!data) return;

  let html = "";
  let total = 0, count = 0;

  for (let key in data) {
    total += data[key];
    count++;

    html += `
      <div>${labels[key]} (${data[key]}%)</div>
      <div class="bar"><div class="fill" style="width:${data[key]}%"></div></div>
    `;
  }

  document.getElementById("bars").innerHTML = html;

  let overall = Math.round(total / count);
  document.getElementById("overallBar").style.width = overall + "%";
  document.getElementById("overallText").innerText = overall + "%";
});

</script>

</body>
</html>
