<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💗 Relationship OS</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d88">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#ffe4ec,#ffd6e0);
}
.nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
}
.section{display:none;padding:15px;}
.section.active{display:block;}
.card{
  background:rgba(255,255,255,0.5);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}
.bar{height:12px;background:#eee;border-radius:20px;}
.fill {
  height:100%;
  background:linear-gradient(90deg,#ff6fa5,#ff2e75);
  border-radius:20px;
  transform:scaleX(0);
  transform-origin:left;
  transition:0.6s;
}
input,textarea{
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:5px;
}
button{
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#ff4d88;
  color:white;
}
.msg{
  padding:8px;
  border-radius:10px;
  margin:5px;
  max-width:70%;
}
.me{background:#ff4d88;color:white;margin-left:auto;}
.other{background:white;}
iframe{width:100%;height:200px;border-radius:10px;}
.notify{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#ff4d88;
  color:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('dashboard')">💗</div>
  <div onclick="show('chat')">💬</div>
  <div onclick="show('tasks')">🎯</div>
  <div onclick="show('memories')">📸</div>
  <div onclick="show('music')">🎵</div>
</div>

<div id="dashboard" class="section active">
  <div class="card">
    <h3 id="userTitle"></h3>
    <div id="bars"></div>
  </div>
</div>

<div id="chat" class="section">
  <div id="chatBox"></div>
  <input id="chatInput">
  <button onclick="sendMsg()">Send</button>
</div>

<div id="tasks" class="section">
  <input id="taskInput">
  <button onclick="addTask()">Add</button>
  <div id="taskList"></div>
</div>

<div id="memories" class="section">
  <input type="file" id="imgInput">
  <textarea id="noteInput"></textarea>
  <button onclick="saveMemory()">Save</button>
  <div id="memoryList"></div>
</div>

<div id="music" class="section">
  <input id="musicInput" placeholder="YouTube link">
  <button onclick="addMusic()">Add</button>
  <div id="musicList"></div>
</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCsv34rRwtD35qcTl8RMeBwFF5F_azkMg8",
  authDomain: "rating-bar-24a81.firebaseapp.com",
  databaseURL: "https://rating-bar-24a81-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rating-bar-24a81",
  storageBucket: "rating-bar-24a81.firebasestorage.app",
  messagingSenderId: "1017485664370",
  appId: "1:1017485664370:web:a0b43f4426238a61ce22eb"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USER
let user=new URLSearchParams(location.search).get("user")||"you";

let appData={}, data={};

const labels={
  trust:"Trust",mood:"Mood",love:"Love",
  angry:"Angry",miss:"Miss",freaky:"Freaky"
};

// LIVE SYNC
db.ref("appData").on("value", snap=>{
  appData = snap.val() || {
    you:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
    her:{trust:50,mood:50,love:50,angry:20,miss:40,freaky:30},
    chat:[],tasks:[],memories:[],music:[]
  };
  data = appData[user];
  renderAll();
});

// SAVE
function save(){
  db.ref("appData").set(appData);
}

// NAV
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// 🔥 FIXED DASHBOARD (SLIDERS)
function renderDashboard(){
  document.getElementById("userTitle").innerText="💗 "+user;

  let html="";
  let hour = new Date().getHours();

  for(let k in data){

    // 🌙 Hide freaky in daytime
    if(k === "freaky" && !(hour >= 23 || hour < 6)){
      continue;
    }

    html += `
    <div style="margin-top:15px;">
      <div style="display:flex;justify-content:space-between;">
        <span>${labels[k]}</span>
        <span>${data[k]}%</span>
      </div>

      <div class="bar"
        ontouchstart="startSlide(event,'${k}')"
        ontouchmove="moveSlide(event,'${k}')"
        onmousedown="startSlide(event,'${k}')"
        onmousemove="moveSlide(event,'${k}')">

        <div class="fill" style="width:${data[k]}%"></div>
      </div>
    </div>`;
  }

  document.getElementById("bars").innerHTML = html;

  setTimeout(()=>{
    document.querySelectorAll(".fill").forEach(el=>{
      el.style.transform="scaleX(1)";
    });
  },100);
}
  
// UPDATE BAR
function updateBar(key,value){
  data[key]=parseInt(value);
  save();
}
function handleBarClick(e, key){

  let hour = new Date().getHours();

  if(key === "freaky"){
    if(!(hour >= 23 || hour < 6)){
      notify("🌙 Freaky only at night");
      return;
    }
  }

  let rect = e.currentTarget.getBoundingClientRect();
  let percent = ((e.clientX - rect.left) / rect.width) * 100;

  percent = Math.max(0, Math.min(100, percent));

  data[key] = Math.round(percent);
  save();
}
let slidingKey = null;
let currentBar = null;

function startSlide(e, key){
  slidingKey = key;
  currentBar = e.currentTarget; // ✅ store correct bar
  updateSlide(e);
}

function moveSlide(e){
  if(!slidingKey) return;
  updateSlide(e);
}

function updateSlide(e){
  let touch = e.touches ? e.touches[0] : e;

  let rect = currentBar.getBoundingClientRect(); // ✅ FIX
  let percent = ((touch.clientX - rect.left) / rect.width) * 100;

  percent = Math.max(0, Math.min(100, percent));

  data[slidingKey] = Math.round(percent);
  save();
}

// stop sliding
document.addEventListener("mouseup", ()=>{
  slidingKey = null;
  currentBar = null;
});
document.addEventListener("touchend", ()=>{
  slidingKey = null;
  currentBar = null;
});
// CHAT
function sendMsg(){
  let t=document.getElementById("chatInput").value;
  appData.chat.push({
    user,
    text:t,
    time:new Date().toLocaleTimeString()
  });
  document.getElementById("chatInput").value="";
  save();
}

function renderChat(){
  let html="";
  appData.chat.forEach(m=>{
    html+=`<div class="msg ${m.user===user?'me':'other'}">
    ${m.text}<br><small>${m.time||""}</small></div>`;
  });
  let box=document.getElementById("chatBox");
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

// TASKS
function addTask(){
  let t=document.getElementById("taskInput").value;
  appData.tasks.push({text:t,done:false});
  document.getElementById("taskInput").value="";
  save();
}

function renderTasks(){
  let html="";
  appData.tasks.forEach((t,i)=>{
    html+=`<div onclick="toggleTask(${i})">
    ${t.done?"✅":"⬜"} ${t.text}</div>`;
  });
  document.getElementById("taskList").innerHTML=html;
}

function toggleTask(i){
  appData.tasks[i].done=!appData.tasks[i].done;
  save();
}

// MEMORIES
function saveMemory(){
  let file=document.getElementById("imgInput").files[0];
  let note=document.getElementById("noteInput").value;

  let reader=new FileReader();
  reader.onload=e=>{
    appData.memories.unshift({
      img:e.target.result,
      note,
      time:new Date().toLocaleString()
    });
    save();
  };
  reader.readAsDataURL(file);
}

function renderMemories(){
  let html="";
  appData.memories.forEach(m=>{
    html+=`<div class="card">
      <img src="${m.img}" style="width:100%">
      <p>${m.note}</p>
      <small>${m.time}</small>
    </div>`;
  });
  document.getElementById("memoryList").innerHTML=html;
}

// MUSIC
function addMusic(){
  let l=document.getElementById("musicInput").value;
  appData.music.push(l);
  document.getElementById("musicInput").value="";
  save();
}

function renderMusic(){
  let html="";
  appData.music.forEach(l=>{
    if(l.includes("playlist")){
      let id=l.split("list=")[1];
      html+=`<iframe src="https://www.youtube.com/embed/videoseries?list=${id}"></iframe>`;
    } else if(l.includes("watch?v=")){
      let id=l.split("v=")[1];
      html+=`<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
    }
  });
  document.getElementById("musicList").innerHTML=html;
}

// RENDER
function renderAll(){
  renderDashboard();
  renderChat();
  renderTasks();
  renderMemories();
  renderMusic();
}

</script>

</body>
</html>
