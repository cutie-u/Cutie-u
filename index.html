<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💗 Relationship OS</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:linear-gradient(135deg,#ffe4ec,#ffd6e0);
  padding-bottom:140px;
}

/* NAV */
.nav{display:flex;justify-content:space-around;padding:10px;}

/* SECTIONS */
.section{display:none;padding:15px;}
.section.active{display:block;}

/* CARD */
.card{
  background:rgba(255,255,255,0.5);
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

/* BARS */
.bar{height:14px;background:#eee;border-radius:20px;margin-top:6px;overflow:hidden;}
.fill{height:100%;background:linear-gradient(90deg,#ff6fa5,#ff2e75);border-radius:20px;}

/* 💬 CHAT UI */
#chatBox{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-bottom:80px;
}

.msg{
  padding:10px 14px;
  border-radius:18px;
  max-width:75%;
  font-size:14px;
  backdrop-filter:blur(10px);
  animation:fadeIn 0.2s ease;
}

.me{
  background:linear-gradient(135deg,#ff4d88,#ff2e75);
  color:white;
  margin-left:auto;
  border-bottom-right-radius:6px;
}

.other{
  background:rgba(255,255,255,0.7);
  border-bottom-left-radius:6px;
}

.ai{
  background:rgba(255,255,255,0.9);
  border-left:3px solid #ff4d88;
}

.msg small{
  display:block;
  font-size:10px;
  opacity:0.6;
}

/* INPUT BAR */
.chatInputBox{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  padding:10px;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(15px);
  display:flex;
  gap:8px;
}

.chatInputBox input{
  flex:1;
  border-radius:20px;
  padding:10px;
  border:none;
}

.chatInputBox button{
  width:40px;height:40px;border-radius:50%;
  background:#ff4d88;color:white;border:none;
}

/* PLAYER */
#globalPlayer{
  position:fixed;
  bottom:80px;
  left:10px;
  width:220px;
  z-index:9999;
}

.playerBox{
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:10px;
}

.playerFull{width:90vw !important;left:5vw !important;}
.playerFull iframe{height:200px;}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(5px);}
  to{opacity:1;}
}
</style>
</head>

<body>

<div id="globalPlayer"></div>

<div class="nav">
  <div onclick="show('dashboard')">💗</div>
  <div onclick="show('chat')">💬</div>
  <div onclick="show('music')">🎵</div>
</div>

<div id="dashboard" class="section active">
  <div id="bars"></div>
</div>

<div id="chat" class="section">
  <div id="chatBox"></div>

  <div class="chatInputBox">
    <input id="chatInput" placeholder="Message...">
    <button onclick="sendMsg()">➤</button>
  </div>
</div>

<div id="music" class="section">
  <input id="musicInput">
  <button onclick="addMusic()">Add</button>
  <div id="musicList"></div>
</div>

<script>

// 🔥 FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCsv34rRwtD35qcTl8RMeBwFF5F_azkMg8",
  authDomain: "rating-bar-24a81.firebaseapp.com",
  databaseURL: "https://rating-bar-24a81-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user=new URLSearchParams(location.search).get("user")||"you";
let appData={}, data={};

const names={you:"Prashant",her:"Kanika"};

const labels={
  trust:"Trust",mood:"Mood",love:"Love",
  angry:"Angry",miss:"Miss",freaky:"Freaky"
};

// 🔥 PRESENCE
let presenceRef=db.ref("appData/presence/"+user);

presenceRef.set({online:true,lastSeen:Date.now()});

window.addEventListener("beforeunload",()=>{
  presenceRef.set({online:false,lastSeen:Date.now()});
});

// 🔥 SYNC
db.ref("appData").on("value",snap=>{
  appData=snap.val()||{you:{},her:{},chat:[],music:[],presence:{}};
  data=appData[user];
  renderAll();
});

// SAVE
function save(){db.ref("appData").set(appData);}

// NAV
function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// STATUS
function showStatus(){
  let other=user==="you"?"her":"you";
  let p=appData.presence?.[other];
  if(!p) return "";
  if(p.online) return "🟢 Online";
  return "Last seen: "+new Date(p.lastSeen).toLocaleTimeString();
}

// DASHBOARD
function renderDashboard(){
  let other=user==="you"?"her":"you";

  document.getElementById("bars").innerHTML=`
  <div class="card">
    <h3>${names[user]}</h3>
    ${renderBars(user,true)}
  </div>

  <div class="card">
    <h3>${names[other]}</h3>
    <small>${showStatus()}</small>
    ${renderBars(other,false)}
  </div>`;
}

function renderBars(person,edit){
  let html="";
  for(let k in labels){
    let val=appData[person][k]?.value||0;
    html+=`
    <div>
      ${labels[k]} ${val}%
      <div class="bar" ${edit?`data-key="${k}"`:""}>
        <div class="fill" style="width:${val}%"></div>
      </div>
    </div>`;
  }
  return html;
}

// CHAT
function sendMsg(){
  let t=document.getElementById("chatInput").value;
  if(!t) return;

  appData.chat.push({user,text:t,time:new Date().toLocaleTimeString()});
  document.getElementById("chatInput").value="";
  save();
}

function renderChat(){
  let html="";
  appData.chat.forEach(m=>{
    let cls=m.user===user?"me":"other";
    if(m.user==="ai") cls="ai";

    html+=`
    <div class="msg ${cls}">
      <b>${m.user==="ai"?"🤖 Therapist AI":m.user}</b><br>
      ${m.text}
      <small>${m.time}</small>
    </div>`;
  });

  let box=document.getElementById("chatBox");
  box.innerHTML=html;
  box.scrollTop=box.scrollHeight;
}

// MUSIC
function getYouTubeId(url){
  if(url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
  if(url.includes("watch?v=")) return url.split("v=")[1].split("&")[0];
}

function playMusic(id){
  db.ref("player").set({songId:id,startedAt:Date.now(),by:names[user]});
}

db.ref("player").on("value",snap=>{
  let p=snap.val();
  if(!p) return;

  document.getElementById("globalPlayer").innerHTML=`
  <div class="playerBox" id="playerBox">
    <small>${p.by}</small>
    <iframe src="https://www.youtube.com/embed/${p.songId}?autoplay=1"></iframe>
  </div>`;
});

function renderMusic(){
  let html="";
  appData.music.forEach(l=>{
    let id=getYouTubeId(l);
    if(!id) return;

    html+=`<div class="card">
      🎵 Song
      <button onclick="playMusic('${id}')">▶️</button>
    </div>`;
  });
  document.getElementById("musicList").innerHTML=html;
}

function addMusic(){
  let l=document.getElementById("musicInput").value;
  if(!l) return;
  appData.music.push(l);
  document.getElementById("musicInput").value="";
  save();
}

// RENDER
function renderAll(){
  renderDashboard();
  renderChat();
  renderMusic();
}

</script>

</body>
</html>
